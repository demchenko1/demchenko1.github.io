<!DOCTYPE html>

<body>

            <svg viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </a>

        <div class="list-separator" aria-hidden="true"></div>

        <a href="https://wa.me/79678689529" class="list-row" aria-label="Message on WhatsApp" rel="noopener noreferrer" target="_blank">
          <span class="row-icon whatsapp-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12.001 2C6.478 2 2.002 6.476 2.002 12c0 1.74.45 3.37 1.236 4.795L2 22l5.354-1.218A9.964 9.964 0 0012.001 22C17.524 22 22 17.524 22 12S17.524 2 12.001 2zm5.26 14.234c-.22.618-1.285 1.18-1.76 1.254-.45.07-.99.1-1.597-.1-.368-.12-.84-.28-1.44-.547-2.53-1.093-4.185-3.634-4.31-3.803-.126-.169-1.02-1.355-1.02-2.583 0-1.228.643-1.832.87-2.083.228-.25.497-.312.663-.312.165 0 .33.002.474.008.152.007.356-.057.557.425.207.498.706 1.72.768 1.845.063.126.104.272.02.44-.082.168-.124.273-.246.42-.124.148-.26.33-.372.443-.124.124-.253.26-.108.51.145.25.643 1.06 1.38 1.716.947.842 1.746 1.102 1.997 1.226.25.124.394.104.54-.063.145-.167.622-.727.788-.976.166-.25.332-.207.56-.124.228.082 1.45.684 1.7.808.25.124.415.186.477.29.062.104.062.602-.158 1.22z" fill="currentColor"/></svg>
          </span>
          <span class="row-label">WhatsApp</span>
          <span class="row-chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </a>

        <div class="list-separator" aria-hidden="true"></div>

        <a href="https://www.instagram.com/demchenko_574?igsh=MWp6aml3dGhtbmExZw%3D%3D&utm_source=qr" class="list-row" aria-label="Follow on Instagram" rel="noopener noreferrer" target="_blank">
          <span class="row-icon instagram-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5.5" stroke="currentColor" stroke-width="1.75"/><circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.75"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>
          </span>
          <span class="row-label">Instagram</span>
          <span class="row-chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </a>

        <div class="list-separator" aria-hidden="true"></div>

        <a href="https://www.linkedin.com/in/%D0%B0%D0%BB%D0%B5%D0%BA%D1%81%D0%B0%D0%BD%D0%B4%D1%80-%D0%B4%D0%B5%D0%BC%D1%87%D0%B5%D0%BD%D0%BA%D0%BE-292b65329?utm_source=share_via&utm_content=profile&utm_medium=member_ios" class="list-row" aria-label="View LinkedIn profile" rel="noopener noreferrer" target="_blank">
          <span class="row-icon linkedin-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z" fill="currentColor"/><circle cx="4" cy="4" r="2" fill="currentColor"/></svg>
          </span>
          <span class="row-label">LinkedIn</span>
          <span class="row-chevron" aria-hidden="true">

      </div>

    <!-- ADD CONTACT -->
    <section class="section-group">
      <div class="list-card">
        <button class="list-row action-row" id="addContactBtn" type="button" aria-label="Save Alexander's contact to your phone">
          <span class="row-icon add-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
          </span>
          <span class="row-label action-label">Add Contact</span>
        </button>
      </div>
    </section>

    <!-- CRYPTO -->
    <section class="section-group" aria-label="Crypto">
      <div class="list-card">
        <button class="list-row" id="cryptoToggle" aria-expanded="false" aria-controls="cryptoPanel" type="button">
          <span class="row-icon crypto-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm.75 14.25V18h-1.5v-1.75C9.5 16 8.5 15 8.5 13.75c0-.85.5-1.6 1.25-1.97-.5-.35-.75-.87-.75-1.53 0-1.1.9-2 2-2V7h1.5v1.25c1.1 0 2 .9 2 2h-1.5c0-.28-.22-.5-.5-.5H11c-.28 0-.5.22-.5.5s.22.5.5.5h1c1.1 0 2 .9 2 2s-.9 2-2 2h-.25v.5zM11 14.5h1.25c.28 0 .5-.22.5-.5s-.22-.5-.5-.5H11v1z" fill="currentColor"/></svg>
          </span>
          <span class="row-label">Crypto</span>
          <span class="row-chevron crypto-chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </button>

        <div class="crypto-panel" id="cryptoPanel">
          <div class="list-separator" aria-hidden="true"></div>
          <div class="crypto-content">
            <div class="crypto-info">
              <span class="crypto-platform">Bybit UID</span>
              <span class="crypto-value">100711102</span>
            </div>
            <button class="copy-btn" id="copyUID" aria-label="Copy Bybit UID to clipboard" type="button" data-copy="100711102">
              <span class="copy-btn-default" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.75"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
              </span>
              <span class="copy-btn-success" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </span>
              <span class="visually-hidden">Copy</span>
            </button>
          </div>
        </div>
      </div>
      <p class="section-footer">Support me or send crypto if needed.</p>
    </section>

  </main>

  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true">
    <span class="toast-icon" aria-hidden="true">✓</span>
    <span class="toast-text">Copied to clipboard</span>
  </div>

  <script src="script.js"></script>
</body>
</html>
