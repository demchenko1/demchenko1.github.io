<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#111110" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="description" content="Alexander Demchenko — Let's connect." />

  <title>Alexander Demchenko</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- =============================================
       PAGE WRAPPER — fade-in on load
  ============================================= -->
  <main class="page" role="main" aria-label="Contact card for Alexander Demchenko">

    <!-- =============================================
         HERO — Avatar + Name
    ============================================= -->
    <section class="hero" aria-label="Profile">
      <div class="avatar-ring" aria-hidden="true">
        <div class="avatar" role="img" aria-label="Alexander Demchenko's avatar">
          <!-- Initials avatar — replace with <img> if you have a photo -->
          <span class="avatar-initials" aria-hidden="true">AD</span>
        </div>
      </div>

      <h1 class="name">Alexander Demchenko</h1>
      <p class="tagline">Traveling the world · Always up for a good chat</p>
    </section>

    <!-- =============================================
         CONNECT — Messaging buttons
    ============================================= -->
    <section class="card connect-card" aria-labelledby="connect-heading">
      <h2 class="card-label" id="connect-heading">Connect</h2>

      <div class="connect-grid">

        <!-- Telegram -->
        <a
          href="https://t.me/demchenko00"
          class="connect-btn"
          aria-label="Message on Telegram"
          rel="noopener noreferrer"
        >
          <span class="connect-icon" aria-hidden="true">
            <!-- Telegram icon -->
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.93 6.617l-1.68 7.923c-.125.561-.453.699-.917.435l-2.54-1.872-1.225 1.18c-.136.135-.25.25-.511.25l.181-2.583 4.694-4.239c.204-.181-.044-.281-.317-.1L7.77 14.66l-2.5-.779c-.543-.17-.554-.543.114-.803l9.73-3.751c.452-.165.849.11.816.49z" fill="currentColor"/>
            </svg>
          </span>
          <span class="connect-label">Telegram</span>
          <span class="connect-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </a>

        <!-- WhatsApp -->
        <a
          href="https://wa.me/79678689529"
          class="connect-btn"
          aria-label="Message on WhatsApp"
          rel="noopener noreferrer"
        >
          <span class="connect-icon" aria-hidden="true">
            <!-- WhatsApp icon -->
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12.001 2C6.478 2 2.002 6.476 2.002 12c0 1.74.45 3.37 1.236 4.795L2 22l5.354-1.218A9.964 9.964 0 0012.001 22C17.524 22 22 17.524 22 12S17.524 2 12.001 2zm5.26 14.234c-.22.618-1.285 1.18-1.76 1.254-.45.07-.99.1-1.597-.1-.368-.12-.84-.28-1.44-.547-2.53-1.093-4.185-3.634-4.31-3.803-.126-.169-1.02-1.355-1.02-2.583 0-1.228.643-1.832.87-2.083.228-.25.497-.312.663-.312.165 0 .33.002.474.008.152.007.356-.057.557.425.207.498.706 1.72.768 1.845.063.126.104.272.02.44-.082.168-.124.273-.246.42-.124.148-.26.33-.372.443-.124.124-.253.26-.108.51.145.25.643 1.06 1.38 1.716.947.842 1.746 1.102 1.997 1.226.25.124.394.104.54-.063.145-.167.622-.727.788-.976.166-.25.332-.207.56-.124.228.082 1.45.684 1.7.808.25.124.415.186.477.29.062.104.062.602-.158 1.22z" fill="currentColor"/>
            </svg>
          </span>
          <span class="connect-label">WhatsApp</span>
          <span class="connect-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </a>

        <!-- LinkedIn -->
        <a
          href="https://www.linkedin.com/in/александр-демченко-292b65329?utm_source=share_via&utm_content=profile&utm_medium=member_ios"
          class="connect-btn"
          aria-label="View LinkedIn profile"
          rel="noopener noreferrer"
        >
          <span class="connect-icon" aria-hidden="true">
            <!-- LinkedIn icon -->
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z" fill="currentColor"/>
              <circle cx="4" cy="4" r="2" fill="currentColor"/>
            </svg>
          </span>
          <span class="connect-label">LinkedIn</span>
          <span class="connect-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </a>

      </div>
    </section>

    <!-- =============================================
         ADD CONTACT — vCard download
    ============================================= -->
    <section class="add-contact-section" aria-label="Save contact">
      <button
        class="add-contact-btn"
        id="addContactBtn"
        aria-label="Save Alexander's contact to your phone"
        type="button"
      >
        <span class="add-contact-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 11c1.657 0 3-1.343 3-3S17.657 5 16 5c-1.656 0-3 1.343-3 3s1.344 3 3 3zm-8 0c1.657 0 3-1.343 3-3S9.657 5 8 5C6.344 5 5 6.343 5 8s1.344 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" fill="currentColor"/>
            <circle cx="20" cy="20" r="4" fill="var(--accent)" />
            <path d="M20 17.5v5M17.5 20h5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <span>Add Contact</span>
      </button>
    </section>

    <!-- =============================================
         CRYPTO — Expandable, low prominence
    ============================================= -->
    <section class="crypto-section" aria-label="Crypto">
      <button
        class="crypto-toggle"
        id="cryptoToggle"
        aria-expanded="false"
        aria-controls="cryptoPanel"
        type="button"
      >
        <span class="crypto-toggle-inner">
          <span class="crypto-toggle-icon" aria-hidden="true">
            <!-- Bitcoin-adjacent generic icon -->
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm.75 14.25V18h-1.5v-1.75C9.5 16 8.5 15 8.5 13.75c0-.85.5-1.6 1.25-1.97-.5-.35-.75-.87-.75-1.53 0-1.1.9-2 2-2V7h1.5v1.25c1.1 0 2 .9 2 2h-1.5c0-.28-.22-.5-.5-.5H11c-.28 0-.5.22-.5.5s.22.5.5.5h1c1.1 0 2 .9 2 2s-.9 2-2 2h-.25v.5zM11 14.5h1.25c.28 0 .5-.22.5-.5s-.22-.5-.5-.5H11v1z" fill="currentColor"/>
            </svg>
          </span>
          <span class="crypto-toggle-text">Crypto</span>
        </span>
        <span class="crypto-toggle-chevron" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
      </button>

      <div class="crypto-panel" id="cryptoPanel" role="region" aria-labelledby="cryptoToggle">
        <p class="crypto-description">Support me or send crypto if needed.</p>
        <div class="crypto-row">
          <div class="crypto-info">
            <span class="crypto-platform">Bybit UID</span>
            <span class="crypto-value" id="bybitUID">100711102</span>
          </div>
          <button
            class="copy-btn"
            id="copyUID"
            aria-label="Copy Bybit UID to clipboard"
            type="button"
            data-copy="100711102"
          >
            <span class="copy-btn-default" aria-hidden="true">
              <!-- Copy icon -->
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="9" y="9" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.75"/>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="copy-btn-success" aria-hidden="true">
              <!-- Check icon -->
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="visually-hidden">Copy</span>
          </button>
        </div>
      </div>
    </section>

    <!-- =============================================
         FOOTER
    ============================================= -->
    <footer class="footer" role="contentinfo">
      <p>Made with care · <span id="currentYear"></span></p>
    </footer>

  </main>

  <!-- Toast notification for clipboard feedback -->
  <div
    class="toast"
    id="toast"
    role="status"
    aria-live="polite"
    aria-atomic="true"
  >
    <span class="toast-icon" aria-hidden="true">✓</span>
    <span class="toast-text">Copied to clipboard</span>
  </div>

  <script src="script.js"></script>
</body>
</html>
